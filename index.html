<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <title>Signage</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <video
      id="v"
      autoplay
      muted
      loop
      playsinline
      preload="auto">
    </video>
  </div>

  <script>
    const v = document.getElementById("v");

    // Service Worker（PWA要件 & 安定化）
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }

    // 1) キャッシュ回避：起動時に必ずURLを変える（最新を取りに行きやすくする）
    function setVideoSrc() {
      const ts = Date.now();
      v.src = `./002.mp4?v=${ts}`;
      v.load();
      v.play().catch(() => {});
    }

    // 2) 再生が止まった・ネットワークが揺れた時の自己回復
    v.addEventListener("error",   () => setTimeout(setVideoSrc, 5000));
    v.addEventListener("stalled", () => setTimeout(setVideoSrc, 5000));

    // 端末によっては初回だけ再生が止まることがあるので、保険でplay()を試す
    v.addEventListener("canplay", () => {
      v.play().catch(() => {});
    });

    // 3) 毎日 03:30 にリロード（開きっぱなしでも更新が反映されるようにする）
    function scheduleDailyReload(hour = 3, minute = 30) {
      const now = new Date();
      const next = new Date(now);
      next.setHours(hour, minute, 0, 0);
      if (next <= now) next.setDate(next.getDate() + 1);

      setTimeout(() => location.reload(), next.getTime() - now.getTime());
    }

    // 初期化
    setVideoSrc();
    scheduleDailyReload(17, 45);
  </script>
</body>
</html>
